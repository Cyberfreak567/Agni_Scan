id: missing-security-headers

info:
  name: Missing Recommended Security Headers
  author: codex
  severity: medium
  description: Detects HTTP responses missing common browser hardening headers.
  tags: misconfig,headers

http:
  - method: GET
    path:
      - "{{BaseURL}}"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: dsl
        dsl:
          - "!contains(tolower(all_headers), 'x-frame-options:')"
          - "!contains(tolower(all_headers), 'content-security-policy:')"
